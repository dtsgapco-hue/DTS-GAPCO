<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Vistoria de Viatura</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── TOKENS ───────────────────────────────────────────── */
  :root {
    --bg:        #111410;
    --surface:   #1c2118;
    --card:      #222a1e;
    --border:    #3a4832;
    --accent:    #7eb832;
    --accent2:   #c8d850;
    --warn:      #e8a225;
    --danger:    #d94f3d;
    --muted:     #556348;
    --text:      #d9e8c4;
    --text2:     #8fa880;
    --ok-bg:     #1a2f14;
    --ok-color:  #7eb832;
    --alt-bg:    #2e2208;
    --alt-color: #e8a225;
    --nv-bg:     #1a1e28;
    --nv-color:  #8899bb;
    --font-head: 'Bebas Neue', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --font-body: 'Barlow', sans-serif;
    --radius:    6px;
  }

  /* ── RESET ────────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding-bottom: 40px;
  }

  /* ── HEADER ───────────────────────────────────────────── */
  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 24px; height: 24px; fill: #111; }
  header h1 {
    font-family: var(--font-head);
    font-size: 1.9rem;
    letter-spacing: 2px;
    color: var(--accent2);
    line-height: 1;
  }
  header p {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* ── MAIN CONTAINER ───────────────────────────────────── */
  main { max-width: 680px; margin: 0 auto; padding: 20px 16px; }

  /* ── SELECTOR CARD ────────────────────────────────────── */
  .selector-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .selector-label {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▼';
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--accent);
    font-size: 0.7rem;
    pointer-events: none;
  }
  select#regSelect {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 40px 12px 14px;
    font-family: var(--font-mono);
    font-size: 1.1rem;
    letter-spacing: 2px;
    appearance: none;
    cursor: pointer;
    transition: border-color .2s;
    outline: none;
  }
  select#regSelect:focus { border-color: var(--accent); }
  select#regSelect option { background: var(--surface); }

  /* ── LOADING / EMPTY STATES ───────────────────────────── */
  .state-msg {
    text-align: center;
    padding: 48px 20px;
    font-family: var(--font-mono);
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 1px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── SECTION TITLE ────────────────────────────────────── */
  .section-title {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-head);
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: var(--accent2);
    margin: 28px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .section-title .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── ODOMETER ─────────────────────────────────────────── */
  .odo-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 10px;
  }
  .odo-icon { font-size: 1.8rem; }
  .odo-label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .odo-value {
    font-family: var(--font-head);
    font-size: 2.2rem;
    color: var(--accent2);
    letter-spacing: 3px;
    line-height: 1;
  }

  /* ── MAINTENANCE ──────────────────────────────────────── */
  .manut-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .manut-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .manut-badge {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .manut-date {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.3;
  }
  .manut-item.latest { border-color: var(--accent); }
  .manut-item.latest .manut-date { color: var(--accent2); }

  /* ── CHECKLIST ────────────────────────────────────────── */
  .checklist-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .check-item {
    border-radius: var(--radius);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    border: 1px solid transparent;
  }
  .check-item.ok   { background: var(--ok-bg);  border-color: #2e5020; }
  .check-item.alt  { background: var(--alt-bg); border-color: #5a3e0a; }
  .check-item.nv   { background: var(--nv-bg);  border-color: #3a4560; }
  .check-badge {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 3px 7px;
    border-radius: 3px;
    flex-shrink: 0;
    min-width: 34px;
    text-align: center;
  }
  .check-item.ok  .check-badge { background: var(--ok-color);  color: #0a1a06; }
  .check-item.alt .check-badge { background: var(--alt-color); color: #1a0e02; }
  .check-item.nv  .check-badge { background: #2e3d58; color: var(--nv-color); border: 1px solid #3a4560; }
  .check-name {
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.2;
  }
  .check-item.nv .check-name { color: #7a8fa8; }

  /* ── PHOTOS ───────────────────────────────────────────── */
  .photos-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .photo-thumb {
    aspect-ratio: 1;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    background: var(--surface);
  }
  .photo-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform .2s;
  }
  .photo-thumb:hover img { transform: scale(1.06); }

  /* ── MISSIONS ─────────────────────────────────────────── */
  .mission-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }
  .mission-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px;
    background: var(--accent);
  }
  .mission-card { padding-left: 20px; }
  .mission-header {
    display: flex; align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
  }
  .mission-time {
    font-family: var(--font-head);
    font-size: 1.8rem;
    color: var(--accent2);
    letter-spacing: 2px;
    line-height: 1;
  }
  .mission-sys {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 1px;
    background: var(--accent);
    color: #111;
    padding: 3px 8px;
    border-radius: 3px;
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .mission-desc {
    font-size: 0.95rem;
    color: var(--text);
    line-height: 1.5;
    margin-bottom: 10px;
  }

  /* ── TALLY BUTTON ─────────────────────────────────────── */
  .tally-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius);
    padding: 15px 20px;
    font-family: var(--font-head);
    font-size: 1.3rem;
    letter-spacing: 3px;
    cursor: pointer;
    text-decoration: none;
    margin-top: 8px;
    transition: background .15s, transform .1s;
  }
  .tally-btn:hover  { background: var(--accent2); transform: translateY(-1px); }
  .tally-btn:active { transform: translateY(0); }
  .tally-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  /* ── NO MISSIONS NOTICE ───────────────────────────────── */
  .no-mission {
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    font-family: var(--font-mono);
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 1px;
  }

  /* ── MODAL LIGHTBOX ───────────────────────────────────── */
  #lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0);
    backdrop-filter: blur(0px);
    -webkit-backdrop-filter: blur(0px);
    z-index: 999;
    align-items: center; justify-content: center;
    transition: background .25s ease, backdrop-filter .25s ease;
  }
  #lightbox.open {
    display: flex;
    background: rgba(0,0,0,.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    animation: lb-fade-in .25s ease forwards;
  }
  @keyframes lb-fade-in {
    from { background: rgba(0,0,0,0); }
    to   { background: rgba(0,0,0,.88); }
  }
  #lb-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    animation: lb-zoom-in .25s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes lb-zoom-in {
    from { opacity: 0; transform: scale(.88); }
    to   { opacity: 1; transform: scale(1); }
  }
  #lightbox img {
    max-width: 95vw; max-height: 90vh;
    border-radius: var(--radius);
    object-fit: contain;
    box-shadow: 0 24px 80px rgba(0,0,0,.8);
    display: block;
  }
  #lb-close {
    position: fixed; top: 16px; right: 16px;
    width: 40px; height: 40px;
    background: rgba(255,255,255,.12);
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 50%;
    color: #fff;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    transition: background .15s;
    z-index: 1000;
  }
  #lb-close:hover { background: rgba(255,255,255,.25); }

  /* ── RESPONSIVE ───────────────────────────────────────── */
  @media (max-width: 420px) {
    .manut-grid        { grid-template-columns: 1fr; }
    .checklist-grid    { grid-template-columns: 1fr; }
    .photos-grid       { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header>
  <div class="header-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zm-.5 1.5 1.96 2.5H17V9.5h2.5zM6 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm2.22-3c-.55-.61-1.33-1-2.22-1s-1.67.39-2.22 1H3V6h12v9H8.22zM18 18c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/>
    </svg>
  </div>
  <div>
    <h1>VISTORIA DE VIATURA</h1>
    <p>SISTEMA DE VERIFICAÇÃO PRÉ-MISSÃO</p>
  </div>
</header>

<!-- ── LIGHTBOX ─────────────────────────────────────────── -->
<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()" title="Fechar">✕</button>
  <div id="lb-wrap">
    <img id="lbImg" src="" alt="Foto ampliada">
  </div>
</div>

<!-- ── MAIN ─────────────────────────────────────────────── -->
<main>

  <!-- Intro text -->
  <div style="margin-bottom:20px; padding:18px 20px; background:var(--surface); border:1px solid var(--border); border-left:4px solid var(--accent); border-radius:var(--radius);">
    <div style="font-family:var(--font-head);font-size:1.4rem;letter-spacing:3px;color:var(--accent2);margin-bottom:6px;">SISTEMA DE APOIO AO MOTORISTA</div>
    <div style="font-family:var(--font-body);font-size:0.9rem;color:var(--text2);line-height:1.6;">Verifique as condições da viatura que irá realizar a missão selecionando o <span style="font-family:var(--font-mono);color:var(--accent);letter-spacing:1px;">REG.FAB</span> na lista a seguir.</div>
  </div>

  <!-- Selector -->
  <div class="selector-card">
    <div class="selector-label">▶ SELECIONE O REGISTRO DA VIATURA</div>
    <div class="select-wrap">
      <select id="regSelect" onchange="onRegChange()">
        <option value="">— carregando registros... —</option>
      </select>
    </div>
  </div>

  <!-- Dynamic content area -->
  <div id="content">
    <div class="state-msg">
      <div class="spinner"></div>
      AGUARDANDO SELEÇÃO
    </div>
  </div>

</main>

<script>
// ── CONFIG ───────────────────────────────────────────────
var API = 'https://samed-api.dtsgapco.workers.dev';

// ── INIT ─────────────────────────────────────────────────
window.addEventListener('load', function() {
  fetch(API + '/viaturas')
    .then(function(r) { return r.json(); })
    .then(function(lista) {
      populateSelect(lista);
    })
    .catch(function(err) {
      document.getElementById('regSelect').innerHTML =
        '<option value="">— erro ao carregar registros —</option>';
      console.error(err);
    });
});

function populateSelect(regs) {
  var sel = document.getElementById('regSelect');
  sel.innerHTML = '<option value="">— selecione uma viatura —</option>';
  regs.slice().sort(function(a, b) {
    return String(b).localeCompare(String(a), 'pt-BR', { numeric: true });
  }).forEach(function(r) {
    var opt = document.createElement('option');
    opt.value = opt.textContent = r;
    sel.appendChild(opt);
  });
}

// ── ON SELECT ────────────────────────────────────────────
function onRegChange() {
  var reg = document.getElementById('regSelect').value;
  if (!reg) {
    document.getElementById('content').innerHTML =
      '<div class="state-msg">AGUARDANDO SELEÇÃO</div>';
    return;
  }
  document.getElementById('content').innerHTML =
    '<div class="state-msg"><div class="spinner"></div>BUSCANDO DADOS...</div>';

  fetch(API + '/viatura?id=' + encodeURIComponent(reg))
    .then(function(r) { return r.json(); })
    .then(function(d) {
      // ── Normaliza os dados da API para o formato do renderer ──

      // Hodômetro
      var vData = {};
      vData.hodometro = d.hodometro || '—';

      // Manutenções: API retorna antepenultima e ultima; penúltima mostrada como —
      vData.manutencoes = [
        d.manutencao && d.manutencao.antepenultima ? d.manutencao.antepenultima : '—',
        d.manutencao && d.manutencao.penultima     ? d.manutencao.penultima     : '—',
        d.manutencao && d.manutencao.ultima        ? d.manutencao.ultima        : '—'
      ];

      // Checklist: API retorna { "Item": "OK"|"Alt."|"N/V" }
      vData.checklist = [];
      if (d.checklist && typeof d.checklist === 'object') {
        Object.keys(d.checklist).forEach(function(item) {
          vData.checklist.push({ item: item, status: d.checklist[item] });
        });
      }

      // Fotos: fotosViatura → fotos da viatura | fotosManutencao → registros de pane/manutenção
      vData.fotosVeiculo = d.fotosViatura || [];
      vData.fotosPane    = d.fotosManutencao || [];

      // Missões: normaliza campos para o formato do renderer
      var missions = (d.missoes || []).map(function(m) {
        return {
          horario:     m.horario     || '--:--',
          sistema:     m.sistema     || '',
          numeroMissao: m.numeroRegistro || m.numeroMissao || '',
          descricao:   m.descricao   || '(sem descrição)'
        };
      });

      renderAll(reg, vData, missions);
    })
    .catch(function(e) {
      console.error(e);
      document.getElementById('content').innerHTML =
        '<div class="state-msg">⚠ ERRO AO BUSCAR DADOS. VERIFIQUE A CONEXÃO.</div>';
    });
}

// ── RENDER ───────────────────────────────────────────────
function renderAll(reg, vData, missions) {
  var html = '';

  if (!vData) {
    html += '<div class="state-msg">⚠ NENHUM DADO ENCONTRADO PARA ' + esc(reg) + '</div>';
  } else {
    // ── HODÔMETRO ──
    html += '<div class="section-title"><span class="dot"></span>HODÔMETRO</div>';
    html += '<div class="odo-card">';
    html += '<div class="odo-icon"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="var(--accent)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v2M6.3 9.3l1.4 1.4M4 14h2"/><path d="M22 4l-7.5 7.5"/><circle cx="12" cy="14" r="1.5" fill="var(--accent)"/><path d="M18 2h4v4"/></svg></div>';
    html += '<div><div class="odo-label">ÚLTIMA LEITURA REGISTRADA</div>';
    html += '<div class="odo-value">' + esc(vData.hodometro) + ' <span style="font-size:1rem;color:var(--muted)">km</span></div></div>';
    html += '</div>';

    // ── MANUTENÇÕES ──
    html += '<div class="section-title"><span class="dot"></span>ÚLTIMAS MANUTENÇÕES</div>';
    html += '<div class="manut-grid">';
    var manutLabels = ['ANTEPENÚLTIMA', 'PENÚLTIMA', 'ÚLTIMA'];
    vData.manutencoes.forEach(function(m, i) {
      var isLatest = i === 2;
      html += '<div class="manut-item' + (isLatest ? ' latest' : '') + '">';
      html += '<div class="manut-badge">' + manutLabels[i] + '</div>';
      html += '<div class="manut-date">' + esc(m || '—') + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // ── CHECKLIST ──
    if (vData.checklist && vData.checklist.length) {
      html += '<div class="section-title"><span class="dot"></span>CHECKLIST DE VISTORIA</div>';
      html += '<div class="checklist-grid">';
      vData.checklist.forEach(function(c) {
        var st  = (c.status || 'N/V').trim();
        var cls = st === 'OK' ? 'ok' : st === 'Alt.' ? 'alt' : 'nv';
        html += '<div class="check-item ' + cls + '">';
        html += '<span class="check-badge">' + esc(st) + '</span>';
        html += '<span class="check-name">' + esc(c.item) + '</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    // ── FOTOS DA VIATURA ──
    if (vData.fotosVeiculo && vData.fotosVeiculo.length) {
      html += '<div class="section-title"><span class="dot"></span>FOTOS DA VIATURA</div>';
      html += '<div class="photos-grid">';
      vData.fotosVeiculo.forEach(function(url, i) {
        html += '<div class="photo-thumb" onclick="openLightbox(\'' + escUrl(url) + '\')">';
        html += '<img src="' + esc(url) + '" alt="Foto ' + (i+1) + '" loading="lazy" onerror="this.parentElement.style.display=\'none\'">';
        html += '</div>';
      });
      html += '</div>';
    }

    // ── FOTOS DE MANUTENÇÃO / PANE ──
    if (vData.fotosPane && vData.fotosPane.length) {
      html += '<div class="section-title"><span class="dot"></span>REGISTROS DE MANUTENÇÃO</div>';
      html += '<div class="photos-grid">';
      vData.fotosPane.forEach(function(url, i) {
        html += '<div class="photo-thumb" onclick="openLightbox(\'' + escUrl(url) + '\')">';
        html += '<img src="' + esc(url) + '" alt="Manutenção ' + (i+1) + '" loading="lazy" onerror="this.parentElement.style.display=\'none\'">';
        html += '</div>';
      });
      html += '</div>';
    }
  }

  // ── MISSÕES DO DIA ──
  html += '<div class="section-title"><span class="dot"></span>MISSÕES DO DIA</div>';

  if (!missions || missions.length === 0) {
    html += '<div class="no-mission">NENHUMA MISSÃO REGISTRADA PARA HOJE</div>';
  } else {
    missions.forEach(function(m) {
      html += '<div class="mission-card">';
      html += '<div class="mission-header">';
      html += '<div class="mission-time">' + esc(m.horario || '--:--') + '</div>';
      if (m.sistema) html += '<div class="mission-sys">' + esc(m.sistema) + '</div>';
      html += '</div>';
      html += '<div class="mission-desc">' + esc(m.descricao || '(sem descrição)') + '</div>';
      if (m.numeroMissao) {
        html += '<div style="display:inline-flex;align-items:center;gap:8px;background:#0d1f0a;border:1.5px solid var(--accent);border-radius:4px;padding:6px 12px;margin-bottom:10px;">';
        html += '<span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--muted);letter-spacing:2px;">Nº MISSÃO</span>';
        html += '<span style="font-family:var(--font-head);font-size:1.6rem;color:var(--accent2);letter-spacing:3px;line-height:1;">' + esc(m.numeroMissao) + '</span>';
        html += '</div>';
      }
      // Botão principal — missão completa
      var tallyUrl = buildTallyUrl(reg, m);
      html += '<a class="tally-btn" href="' + esc(tallyUrl) + '" target="_blank" rel="noopener">';
      html += '<svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;flex-shrink:0"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
      html += 'ABRIR FORMULÁRIO DESTA MISSÃO';
      html += '</a>';
      html += '</div>';
    });
  }

  // Sem missões — botão simples
  if (vData && (!missions || missions.length === 0)) {
    var tallyBase = buildTallyUrl(reg, null);
    html += '<a class="tally-btn" href="' + esc(tallyBase) + '" target="_blank" rel="noopener" style="margin-top:8px">';
    html += '<svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;flex-shrink:0"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
    html += 'ABRIR FORMULÁRIO DE SAÍDA';
    html += '</a>';
  }

  // Botão fixo no final — missão não listada (só aparece quando há missões)
  if (vData && missions && missions.length > 0) {
    var tallySimples = buildTallyUrl(reg, null);
    html += '<div style="margin-top:32px;padding-top:20px;border-top:1px dashed var(--border);">';
    html += '<div style="font-family:var(--font-mono);font-size:0.65rem;color:var(--warn);letter-spacing:2px;text-align:center;margin-bottom:10px;">&#9888; MISSÃO NÃO LISTADA ACIMA?</div>';
    html += '<a href="' + esc(tallySimples) + '" target="_blank" rel="noopener" ';
    html += 'style="display:flex;align-items:center;justify-content:center;gap:10px;padding:15px;';
    html += 'background:#2a1f00;border:2px solid #f59e0b;border-radius:var(--radius);';
    html += 'font-family:var(--font-head);font-size:1.25rem;letter-spacing:3px;color:#fbbf24;text-decoration:none;';
    html += 'box-shadow:0 0 20px rgba(245,158,11,0.4);">';
    html += '<svg viewBox="0 0 24 24" fill="#fbbf24" style="width:20px;height:20px;flex-shrink:0"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
    html += 'ABRIR FORMULÁRIO SÓ COM REG.FAB';
    html += '</a>';
    html += '</div>';
  }

  document.getElementById('content').innerHTML = html;
}

// ── TALLY URL BUILDER ────────────────────────────────────
function buildTallyUrl(reg, mission) {
  var base = 'https://tally.so/r/obBRAX';
  var params = new URLSearchParams();
  params.set('reg.fab', reg);
  if (mission) {
    if (mission.sistema)     params.set('sistema',    mission.sistema);
    if (mission.numeroMissao) params.set('nsis',      mission.numeroMissao);
    if (mission.descricao)   params.set('descrição',  mission.descricao);
    if (mission.horario)     params.set('SR',         mission.horario);
  }
  return base + '?' + params.toString();
}

// ── LIGHTBOX ─────────────────────────────────────────────
function openLightbox(url) {
  var lb  = document.getElementById('lightbox');
  var img = document.getElementById('lbImg');
  // reinicia animação do wrap
  var wrap = document.getElementById('lb-wrap');
  wrap.style.animation = 'none';
  img.src = url;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
  // força reflow para a animação rodar novamente
  void wrap.offsetWidth;
  wrap.style.animation = '';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lbImg').src = '';
  document.body.style.overflow = '';
}
// Fecha clicando no fundo escuro (mas não na imagem)
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this || e.target === document.getElementById('lb-wrap')) closeLightbox();
});
// Fecha com ESC
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeLightbox();
});

// ── UTILS ─────────────────────────────────────────────────
function esc(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escUrl(url) {
  return String(url || '').replace(/'/g, '%27');
}
</script>
